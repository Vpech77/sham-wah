services:
  gui:
    build:
      context: ./gui
      dockerfile: Dockerfile.dev
    container_name: nuxt_dev
    ports:
      - "3000:3000"
    volumes:
      - ./gui:/app
      - /app/node_modules
    env_file:
      - ./gui/.env
    depends_on:
      - api

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: fastapi_dev
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    env_file:
      - ./api/.env
    environment:
      RUNNING_IN_DOCKER: "true"
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    build:
      context: ./neo4j
      dockerfile: Dockerfile
    container_name: neo4j_dev
    ports:
      - "7474:7474"
      - "7687:7687"
    env_file:
      - ./neo4j/.env
    environment:
      NEO4J_dbms_security_procedures_unrestricted: "n10s.*"
      NEO4J_dbms_security_procedures_allowlist: "n10s.*"

    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  neo4j_data:
  neo4j_logs:
